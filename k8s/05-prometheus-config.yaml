apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: ai-log-anomaly
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s

    scrape_configs:
      - job_name: 'ingest-service'
        static_configs:
          - targets: ['ingest-service:3000']

      - job_name: 'embedding-service'
        static_configs:
          - targets: ['embedding-service:4100']

      - job_name: 'anomaly-service'
        static_configs:
          - targets: ['anomaly-service:5100']